<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Nueva solicitud de acceso - Iudex</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#0f0f0e;font-family:'Helvetica Neue',Arial,sans-serif;color:#f7f4ee;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">

  <!-- Wrapper -->
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#0f0f0e;">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <!-- Container 560px -->
        <table role="presentation" width="560" cellspacing="0" cellpadding="0" border="0" style="max-width:560px;width:100%;">

          <!-- Header: logo + badge -->
          <tr>
            <td style="padding:0 0 28px 0;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td valign="middle">
                    <img src="https://iudex.app/assets/icon.png" alt="Iudex" width="36" height="36" style="display:block;border:0;border-radius:9px;" />
                  </td>
                  <td align="right" valign="middle">
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                      <tr>
                        <td style="background-color:rgba(201,168,76,0.15);border-radius:6px;padding:6px 14px;">
                          <p style="margin:0;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#c9a84c;font-weight:600;">
                            Nueva solicitud
                          </p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Main Card -->
          <tr>
            <td>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#1a1a18;border-radius:16px;border:1px solid rgba(247,244,238,0.08);overflow:hidden;">

                <!-- Gold accent -->
                <tr>
                  <td style="height:3px;background:linear-gradient(90deg,#c9a84c,#e8c97a);font-size:0;line-height:0;">&nbsp;</td>
                </tr>

                <!-- Name + email header -->
                <tr>
                  <td style="padding:36px 36px 0 36px;">
                    <h1 style="margin:0 0 4px 0;font-family:Georgia,'Playfair Display',serif;font-size:22px;font-weight:600;color:#f7f4ee;line-height:1.3;">
                      {{nombre}} {{apellido}}
                    </h1>
                    <p style="margin:0 0 0 0;font-size:14px;color:#c9a84c;">
                      {{email}}
                    </p>
                  </td>
                </tr>

                <!-- Data Grid -->
                <tr>
                  <td style="padding:28px 36px 0 36px;">

                    <!-- Row 1: Perfil + Ciudad -->
                    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin-bottom:4px;">
                      <tr>
                        <td width="50%" valign="top" style="padding:0 8px 16px 0;">
                          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:rgba(247,244,238,0.04);border-radius:10px;border:1px solid rgba(247,244,238,0.06);">
                            <tr>
                              <td style="padding:16px 18px;">
                                <p style="margin:0 0 4px 0;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5a5a56;font-weight:600;">Perfil</p>
                                <p style="margin:0;font-size:14px;color:#f7f4ee;font-weight:500;">{{perfil}}</p>
                              </td>
                            </tr>
                          </table>
                        </td>
                        <td width="50%" valign="top" style="padding:0 0 16px 8px;">
                          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:rgba(247,244,238,0.04);border-radius:10px;border:1px solid rgba(247,244,238,0.06);">
                            <tr>
                              <td style="padding:16px 18px;">
                                <p style="margin:0 0 4px 0;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5a5a56;font-weight:600;">Ciudad</p>
                                <p style="margin:0;font-size:14px;color:#f7f4ee;font-weight:500;">{{provincia}}</p>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>

                    <!-- Row 2: Fuero + Tamano -->
                    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin-bottom:4px;">
                      <tr>
                        <td width="50%" valign="top" style="padding:0 8px 16px 0;">
                          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:rgba(247,244,238,0.04);border-radius:10px;border:1px solid rgba(247,244,238,0.06);">
                            <tr>
                              <td style="padding:16px 18px;">
                                <p style="margin:0 0 4px 0;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5a5a56;font-weight:600;">Fuero</p>
                                <p style="margin:0;font-size:14px;color:#f7f4ee;font-weight:500;">{{fuero}}</p>
                              </td>
                            </tr>
                          </table>
                        </td>
                        <td width="50%" valign="top" style="padding:0 0 16px 8px;">
                          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:rgba(247,244,238,0.04);border-radius:10px;border:1px solid rgba(247,244,238,0.06);">
                            <tr>
                              <td style="padding:16px 18px;">
                                <p style="margin:0 0 4px 0;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5a5a56;font-weight:600;">Equipo</p>
                                <p style="margin:0;font-size:14px;color:#f7f4ee;font-weight:500;">{{tamano}}</p>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>

                    <!-- Row 3: Telefono (full width) -->
                    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin-bottom:16px;">
                      <tr>
                        <td>
                          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:rgba(247,244,238,0.04);border-radius:10px;border:1px solid rgba(247,244,238,0.06);">
                            <tr>
                              <td style="padding:16px 18px;">
                                <p style="margin:0 0 4px 0;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#5a5a56;font-weight:600;">Telefono</p>
                                <p style="margin:0;font-size:14px;color:#f7f4ee;font-weight:500;">{{telefono}}</p>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>

                  </td>
                </tr>

                <!-- Mensaje section -->
                <tr>
                  <td style="padding:0 36px;">
                    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                      <tr><td style="height:1px;background-color:rgba(247,244,238,0.06);font-size:0;line-height:0;">&nbsp;</td></tr>
                    </table>
                    <p style="margin:20px 0 10px 0;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:#c9a84c;font-weight:600;">
                      Mensaje del usuario
                    </p>
                    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin-bottom:20px;">
                      <tr>
                        <td style="background-color:rgba(201,168,76,0.06);border-radius:10px;border:1px solid rgba(201,168,76,0.1);padding:18px 20px;">
                          <p style="margin:0;font-size:14px;line-height:1.7;color:rgba(247,244,238,0.85);font-style:italic;">
                            "{{mensaje}}"
                          </p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

                <!-- Actions -->
                <tr>
                  <td style="padding:8px 36px 36px 36px;">
                    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                      <tr>
                        <!-- Reply button -->
                        <td align="center" style="padding-right:8px;" width="50%">
                          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                            <tr>
                              <td align="center" style="background-color:#c9a84c;border-radius:10px;">
                                <a href="mailto:{{email}}?subject=Acceso anticipado a Iudex — {{nombre}}" style="display:block;padding:13px 20px;font-size:13px;font-weight:600;color:#0f0f0e;text-decoration:none;font-family:'Helvetica Neue',Arial,sans-serif;text-align:center;">
                                  Responder
                                </a>
                              </td>
                            </tr>
                          </table>
                        </td>
                        <!-- WhatsApp button -->
                        <td align="center" style="padding-left:8px;" width="50%">
                          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                            <tr>
                              <td align="center" style="border-radius:10px;border:1px solid rgba(247,244,238,0.15);">
                                <a href="https://wa.me/{{telefono}}" style="display:block;padding:13px 20px;font-size:13px;font-weight:600;color:#f7f4ee;text-decoration:none;font-family:'Helvetica Neue',Arial,sans-serif;text-align:center;">
                                  WhatsApp
                                </a>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:28px 0;text-align:center;">
              <p style="margin:0;font-size:11px;color:#5a5a56;line-height:1.6;">
                Notificacion interna de Iudex &middot; No reenviar
              </p>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
