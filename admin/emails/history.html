<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>History · Admin Iudex</title>

  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">

  <style>
    dialog#detail-dialog {
      max-width: 900px;
      width: 90vw;
      border: none;
      border-radius: 12px;
      padding: 0;
      background: #ffffff;
    }
    dialog#detail-dialog::backdrop {
      background: rgba(15,15,14,0.5);
    }
    .detail-header {
      padding: 24px;
      border-bottom: 1px solid rgba(15,15,14,0.08);
      position: sticky;
      top: 0;
      background: white;
    }
    .detail-meta {
      padding: 0 24px 16px;
      font-size: 13px;
      color: #5a5a56;
      line-height: 1.8;
    }
    .detail-meta div { margin-bottom: 4px; }
    .detail-iframe {
      width: 100%;
      height: 60vh;
      border: 0;
      border-top: 1px solid rgba(15,15,14,0.08);
      background: #f7f4ee;
    }
  </style>
</head>
<body>

  <header class="admin-topbar">
    <div class="admin-topbar__brand">Iudex<span>admin</span></div>
    <nav class="admin-topbar__nav">
      <a href="./">Composer</a>
      <a href="./history.html" class="active">History</a>
    </nav>
    <div class="admin-topbar__user">
      <span class="admin-topbar__user-email" id="current-email">…</span>
      <button class="admin-topbar__logout" id="btn-logout">Salir</button>
    </div>
  </header>

  <main class="admin-main">

    <div id="config-banner" class="config-banner" style="display:none">
      <strong>Configuración local faltante.</strong> Copiá <code>public/js/env.example.js</code> a <code>public/js/env.js</code> y completá los valores reales de Supabase. Recargá la página después.
    </div>

    <header style="margin-bottom:20px">
      <h1 class="admin-h1">Historial de envíos</h1>
      <p class="admin-subtitle">Últimos 50 emails mandados desde el admin panel.</p>
    </header>

    <article class="admin-card" style="padding:0;overflow:hidden">
      <table class="history-table">
        <thead>
          <tr>
            <th class="col-when">Cuándo</th>
            <th>Asunto</th>
            <th>Destinatario</th>
            <th class="col-status">Estado</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody id="history-body">
          <tr><td colspan="5" style="padding:32px;text-align:center;color:#888">Cargando...</td></tr>
        </tbody>
      </table>
    </article>
  </main>

  <!-- Detail dialog -->
  <dialog id="detail-dialog">
    <div class="detail-header">
      <button id="detail-close" class="btn btn--ghost btn--sm" style="float:right">Cerrar</button>
      <h2 id="detail-subject" style="margin:0;font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:600"></h2>
    </div>
    <div id="detail-meta" class="detail-meta"></div>
    <iframe id="detail-iframe" class="detail-iframe" sandbox="allow-same-origin"></iframe>
  </dialog>

  <script src="../../public/js/env.js"></script>
  <script type="module" src="../js/history.js"></script>
</body>
</html>
