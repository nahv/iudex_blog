# Configuracion del proyecto Supabase para la CLI.
#
# verify_jwt: define si el gateway de Supabase valida el JWT del header
# Authorization antes de invocar la funcion.
#
#   verify_jwt = false  -> la funcion maneja su propia auth (Bearer custom,
#                          Svix signature, etc). Necesario para webhooks
#                          (Database Webhooks usan WEBHOOK_SECRET; Resend
#                          usa firma Svix; ninguno manda JWT real).
#
#   verify_jwt = true   -> el gateway valida la firma del JWT y rechaza
#                          requests sin uno valido. Necesario para funciones
#                          llamadas desde el frontend con auth de usuario
#                          (admin panel, etc).

# --- Webhook-driven (usan auth custom dentro del codigo) ---
[functions.send-inscription-email]
verify_jwt = false

[functions.sync-to-notion]
verify_jwt = false

[functions.notify-email-events]
verify_jwt = false

# --- User-driven (auth via JWT de Supabase Auth) ---
[functions.send-custom-email]
verify_jwt = true

[functions.list-audiences]
verify_jwt = true
