# Configuracion del proyecto Supabase para la CLI.
#
# Este archivo evita que `supabase functions deploy` aplique JWT verification
# por default — un cambio que rompe los Database Webhooks y Resend webhooks
# (ninguno de los dos manda JWTs validos en el header `Authorization`).
#
# Sin este config, las funciones empiezan a devolver 401 en el gateway
# (antes de invocar el codigo) cuando el CLI las redeploya con defaults.
# Con verify_jwt = false, la auth queda en manos de cada funcion:
#   - send-inscription-email + sync-to-notion: bearer WEBHOOK_SECRET
#   - notify-email-events: firma Svix de Resend

[functions.send-inscription-email]
verify_jwt = false

[functions.sync-to-notion]
verify_jwt = false

[functions.notify-email-events]
verify_jwt = false
